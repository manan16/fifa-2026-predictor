services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fifa_predictor
      POSTGRES_USER: fifa_user
      POSTGRES_PASSWORD: fifa_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fifa_user -d fifa_predictor"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: 1
      DATABASE_URL: postgresql://fifa_user:fifa_password@postgres:5432/fifa_predictor
    ports:
      - "9000:9000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "python -m app.db.migrate && python -m app.db.seed && python run.py"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:9000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:

